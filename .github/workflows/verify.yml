name: verify
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install test tools
        run: sudo apt-get update && sudo apt-get install -y busybox rsync
      - name: Verify PollyWAN package source
        run: ./tests/verify.sh
